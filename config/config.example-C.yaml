# LegacyMCP — Profile C: Remote / SaaS
# Default mode: offline. Per-forest mode override: not allowed.
# JSON files are uploaded via LegacyMCP Portal. No direct AD access from the server.
# Authentication required. See deployment-profiles.md for deployment requirements.
# WARNING: Only deploy with a reverse proxy and authentication in front.

profile: C

workspace:
  forests:
    - name: contoso.local
      relation: standalone
      module: ad-core
      file: data/contoso.json    # JSON uploaded via LegacyMCP Portal

# Server binding — Profile C: bind to localhost, proxy terminates TLS externally.
# For TLS direct (without reverse proxy), provide ssl_certfile and ssl_keyfile.
server:
  host: 127.0.0.1
  port: 8080
  # TLS — provide both or neither.
  # ssl_certfile: certs/server.crt
  # ssl_keyfile:  certs/server.key
