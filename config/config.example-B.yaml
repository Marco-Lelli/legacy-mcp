# LegacyMCP — Profile B: Live Mode (internal network)
# MCP server runs on a server inside the customer network.
# Requires WinRM access to Domain Controllers.
# Use gMSA for authentication — no password management.

mode: live

workspace:
  forests:
    - name: contoso.local
      relation: standalone
      dc: dc01.contoso.local      # target Domain Controller
      credentials: gmsa           # gmsa | env (LEGACYMCP_AD_USER / LEGACYMCP_AD_PASSWORD)

# Server binding — used when starting with --transport streamable-http.
# Ignored in stdio mode (Claude Desktop default).
# For TLS, terminate at a reverse proxy (nginx / IIS ARR) in front of uvicorn.
server:
  host: 0.0.0.0   # bind on all interfaces; restrict to LAN via firewall
  port: 8000
