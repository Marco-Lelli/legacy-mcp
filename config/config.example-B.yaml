# LegacyMCP — Profile B-core: Shared LAN
# Default mode: live. Per-forest mode override: allowed.
# MCP server runs on a dedicated member server inside the customer network.
# NEVER run on a Domain Controller.
# Requires WinRM HTTPS access to Domain Controllers on port 5986.

profile: B-core

workspace:
  forests:
    - name: contoso.local
      relation: standalone
      module: ad-core
      dc: dc01.contoso.local      # target Domain Controller
      credentials: gmsa           # gmsa | env (LEGACYMCP_AD_USER / LEGACYMCP_AD_PASSWORD)

    # Per-forest override: module or snapshot that does not support live
    # - name: contoso.local-pki
    #   module: ad-pki
    #   mode: offline              # override: this forest uses offline
    #   file: data/contoso-pki.json

    # Historical snapshot loaded alongside a live forest
    # - name: contoso.local-snapshot
    #   relation: snapshot
    #   module: ad-core
    #   mode: offline
    #   file: data/contoso-snapshot-20260101.json

# Server binding -- Profile B requires host: 0.0.0.0 to be reachable on the network.
# Restrict access at the firewall level. TLS strongly recommended.
server:
  host: 0.0.0.0   # bind on all interfaces; restrict to LAN via firewall
  port: 8000
  snapshot_path: C:\LegacyMCP-Data\snapshots\   # default output dir for create_snapshot
  # TLS -- required for Profile B. Provide both or neither.
  # Generated by the installer (certs\server.crt / certs\server.key) or supply your own.
  ssl_certfile: C:\LegacyMCP\certs\server.crt
  ssl_keyfile:  C:\LegacyMCP\certs\server.key
